spring.application.name=taskapi

spring.datasource.url=jdbc:h2:mem:devdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

logging.level.com.example.taskapi=INFO

security.jwt.secret=CHANGE_ME_TO_LONG_RANDOM_SECRET_32CHARS_MIN
security.jwt.expiration-minutes=60

